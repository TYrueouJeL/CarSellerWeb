services:
  mysql:
    image: mysql:8.0
    container_name: carseller_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: carseller
      MYSQL_USER: carseller
      MYSQL_PASSWORD: carseller
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: carseller_api
    restart: unless-stopped
    ports:
      - "3333:3333"
    environment:
      NODE_ENV: production
      PORT: 3333
      HOST: "0.0.0.0"
      LOG_LEVEL: info
      APP_KEY: "7BH7ni8aBrTox38HCj_jTHhdCVm5QemP"
      APP_URL: "http://localhost:3333"
      SESSION_DRIVER: cookie
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: carseller
      DB_PASSWORD: carseller
      DB_DATABASE: carseller
    depends_on:
      mysql:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    environment:
      - NUXT_PUBLIC_API_URL=/api/
      - NITRO_API_INTERNAL_URL=http://carseller_api:3333
    container_name: carseller_web
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  mysql_data:
